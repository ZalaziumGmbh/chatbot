# cicd

name: deploy-zalazium-prd
on:
  push:
    branches:
      - zalazium-prd
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v3

      # Use Docker login GitHub Action
      - name: Log in to Docker Hubgit reset --hard 
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Build a Docker image of your application and tag the image with the latest commit SHA
      - name: Build container image
        run: |
          docker buildx create --use
          docker buildx build . -f docker/Dockerfile -t ${{ secrets.DOCKER_USER }}/chatbot:prd --load

      # Push image to Docker Hub
      - name: Push image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USER }}/chatbot:prd